<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBooks Authorization</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; color: #333; line-height: 1.6; text-align: center; }
        h1 { color: #1a5276; }
        .code-box { background: #f4f4f4; border: 2px solid #2ca01c; border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0; word-break: break-all; font-family: monospace; font-size: 0.9rem; text-align: left; }
        .label { font-weight: bold; color: #1a5276; margin-bottom: 0.5rem; }
        .copy-btn { padding: 0.5rem 1.5rem; background: #2ca01c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin-top: 0.5rem; }
        .copy-btn:hover { background: #228b15; }
    </style>
</head>
<body>
    <h1>✅ QuickBooks Authorization Successful</h1>
    <p>Copy the <strong>full URL</strong> from your browser's address bar and paste it back to your assistant.</p>
    <div class="code-box">
        <div class="label">Current URL:</div>
        <div id="url-display"></div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText(window.location.href).then(()=>this.textContent='Copied!')">Copy URL</button>
    </div>
    <script>
        document.getElementById('url-display').textContent = window.location.href;
    </script>
</body>
</html>
